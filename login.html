<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="icon" type="image/png" href="assets/logo/BSNOBG.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - B.S. Portfolio Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div id="navbar"></div>
    
    <div id="app" class="container mx-auto p-4 flex flex-grow justify-center items-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-black text-center text-gray-800 mb-6">เข้าสู่ระบบ</h2>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Username</label>
                    <input type="text" id="username" required class="mt-1 block w-full rounded-xl border-2 border-gray-200 p-2.5 outline-none focus:ring-2 focus:ring-indigo-500 bg-white text-xs font-bold">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Password</label>
                    <input type="password" id="password" required class="mt-1 block w-full rounded-xl border-2 border-gray-200 p-2.5 outline-none focus:ring-2 focus:ring-indigo-500 bg-white text-xs font-bold">
                    
                    <div class="mt-2 flex items-start space-x-1 animate-pulse-soft">
                        <span class="text-[11px] leading-none">⚠️</span>
                        <p class="text-[11px] font-bold tracking-wide text-[#7A1C1C] leading-tight">
                            รหัสผ่านต้องมีตัวอักษรภาษาอังกฤษ (a-z) ผสมกับตัวเลขเท่านั้น (เช่น a1234) หากใส่ตัวเลขล้วนจะเข้าไม่ได้
                        </p>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-[#7A1C1C] text-white p-3 rounded-xl font-black text-xs hover:bg-[#631212] transition-all cursor-pointer border-b-4 border-[#D4AF37] active:border-b-0">
                    เข้าสู่ระบบ
                </button>
            </form>
            
            <p class="mt-4 text-center text-xs font-bold text-gray-600">
                ยังไม่มีบัญชี? <a href="./register.html" class="text-indigo-600 hover:underline">สมัครสมาชิกที่นี่</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAGwlUc6aA18z0j5TWCQvHMuoPLXarvK-wvDGF2HkZT3yG-xERFH8WbzuKIEQxFNjAPQ/exec";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            const payload = {
                action: "login",
                username: username,
                password: password
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                if (response.status === "success") {
                    alert("เข้าสู่ระบบสำเร็จ ยินดีต้อนรับคุณ " + response.username);
                    localStorage.setItem("currentUser", response.username);
                    window.location.href = "./index.html"; 
                } else {
                    alert("ข้อผิดพลาด: " + response.message);
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("ไอดีหรือรหัสผ่านผิดพลาด หรือตัวรหัสผ่านไม่มีตัวอักษรภาษาอังกฤษผสมตามกฎความปลอดภัย");
            });
        });
    </script>
</body>
</html>
