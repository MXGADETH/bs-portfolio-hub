<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="icon" type="image/png" href="assets/logo/BSNOBG.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - B.S. Portfolio Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100">

    <div id="navbar"></div>
    <div id="app" class="container mx-auto p-4 flex justify-center items-center min-h-[80vh]">
        </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">เข้าสู่ระบบ</h2>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" required class="mt-1 block w-full rounded-md border border-gray-300 p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required class="mt-1 block w-full rounded-md border border-gray-300 p-2">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md font-semibold hover:bg-indigo-700 transition">
                เข้าสู่ระบบ
            </button>
        </form>
        
        <p class="mt-4 text-center text-sm text-gray-600">
            ยังไม่มีบัญชี? <a href="./register.html" class="text-indigo-600 hover:underline">สมัครสมาชิกที่นี่</a>
        </p>
    </div>

    <script>
        // ⚠️ วางลิงก์ Web App URL เดิมเหมือนข้างบนเลยครับ
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAGwlUc6aA18z0j5TWCQvHMuoPLXarvK-wvDGF2HkZT3yG-xERFH8WbzuKIEQxFNjAPQ/exec";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            const payload = {
                action: "login",
                username: username,
                password: password
            };

            // หมายเหตุ: การเช็คความถูกต้องของ Login จำเป็นต้องอ่านผลลัพธ์กลับมา 
            // ตัว Google Apps Script จำเป็นต้องเปิดสิทธิ์การเข้าถึงให้เรียบร้อยเพื่อรับข้อมูลข้ามโดเมนได้
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",

                headers: {
                    "Content-Type": "text/plain"
             },
            
                body: JSON.stringify(payload)
        })
            .then(res => res.json())
            .then(response => {
                if (response.status === "success") {
                    alert("เข้าสู่ระบบสำเร็จ ยินดีต้อนรับคุณ " + response.username);
                    
                    // สเต็ปเด็ด: สั่งให้เบราว์เซอร์จดจำไว้ว่าไอดีนี้ล็อกอินอยู่
                    localStorage.setItem("currentUser", response.username);
                    
                    // ล็อกอินผ่านแล้ว ให้ย้ายผู้ใช้ไปหน้าหลักกรอกพอร์ต (index.html) 
                    window.location.href = "./index.html"; 
                } else {
                    alert("ข้อผิดพลาด: " + response.message);
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("ไอดีหรือรหัสผ่านผิดพลาด หรืออาจเกิดปัญหาการเชื่อมต่อฐานข้อมูล");
            });
        });
    </script>
</body>
</html>
