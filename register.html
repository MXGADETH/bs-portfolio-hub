<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - B.S. Portfolio Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">สมัครสมาชิกระบบพอร์ต</h2>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username (ไอดีสำหรับเข้าใช้งาน)</label>
                <input type="text" id="username" required class="mt-1 block w-full rounded-md border border-gray-300 p-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email (อีเมล)</label>
                <input type="email" id="email" required class="mt-1 block w-full rounded-md border border-gray-300 p-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password (รหัสผ่าน)</label>
                <input type="password" id="password" required class="mt-1 block w-full rounded-md border border-gray-300 p-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md font-semibold hover:bg-indigo-700 transition">
                สมัครสมาชิก
            </button>
        </form>
        
        <p class="mt-4 text-center text-sm text-gray-600">
            มีบัญชีอยู่แล้ว? <a href="./login.html" class="text-indigo-600 hover:underline">เข้าสู่ระบบที่นี่</a>
        </p>
    </div>

    <script>
        // ⚠️ วางลิงก์ Web App URL ที่คุณก๊อปปี้มาจาก Google Apps Script ในขั้นตอนที่แล้วตรงนี้ครับ
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAGwlUc6aA18z0j5TWCQvHMuoPLXarvK-wvDGF2HkZT3yG-xERFH8WbzuKIEQxFNjAPQ/exec";

        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            // มัดรวมข้อมูลส่งไปแบบ JSON โดยระบุ action เป็น register
            const payload = {
                action: "register",
                username: username,
                email: email,
                password: password
            };

            // ยิงข้อมูลไปหา Google Apps Script
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // ใช้ no-cors สำหรับ Google Script เพื่อเลี่ยงปัญหา cross-origin บล็อกการส่งข้อมูล
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // เนื่องจากโหมด no-cors จะไม่สามารถอ่านค่า response ตรงๆ ได้ 
                // แต่ถ้ามันวิ่งเข้า .then แปลว่าส่งข้อมูลไปถึงหลังบ้านสำเร็จแล้วครับ
                alert("ส่งข้อมูลสมัครสมาชิกสำเร็จ! ลองไปเช็คใน Google Sheets แผ่น 'users' ดูนะครับ");
                window.location.href = "login.html"; // สมัครเสร็จให้ย้ายไปหน้าล็อกอิน
            })
            .catch(error => {
                console.error("Error:", error);
                alert("ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง");
            });
        });
    </script>
</body>
</html>
