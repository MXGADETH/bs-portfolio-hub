<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="icon" type="image/png" href="assets/logo/BSNOBG.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - B.S. Portfolio Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div id="navbar"></div>
    
    <div id="app" class="container mx-auto p-4 flex flex-grow justify-center items-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-black text-center text-gray-800 mb-6">สมัครสมาชิกระบบพอร์ต</h2>
            
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Username (ไอดีสำหรับเข้าใช้งาน)</label>
                    <input type="text" id="username" required class="mt-1 block w-full rounded-xl border-2 border-gray-200 p-2.5 outline-none focus:ring-2 focus:ring-indigo-500 bg-white text-xs font-bold">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Email (อีเมล)</label>
                    <input type="email" id="email" required class="mt-1 block w-full rounded-xl border-2 border-gray-200 p-2.5 outline-none focus:ring-2 focus:ring-indigo-500 bg-white text-xs font-bold">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Password (รหัสผ่าน)</label>
                    <input type="password" id="password" required class="mt-1 block w-full rounded-xl border-2 border-gray-200 p-2.5 outline-none focus:ring-2 focus:ring-indigo-500 bg-white text-xs font-bold">
                    
                    <div class="mt-2 flex items-start space-x-1">
                        <span class="text-[11px] text-amber-600 leading-none">💡</span>
                        <p class="text-[11px] font-bold tracking-wide text-gray-500 leading-tight">
                            คำแนะนำ: ระบบรองรับเฉพาะรหัสผ่านที่มี <strong class="text-[#7A1C1C] font-black bg-[#7A1C1C]/5 px-1 rounded-md">ตัวอักษรภาษาอังกฤษผสมตัวเลข</strong> เท่านั้น (เช่น a1234) ห้ามกรอกตัวเลขล้วน
                        </p>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-[#7A1C1C] text-white p-3 rounded-xl font-black text-xs hover:bg-[#631212] transition-all cursor-pointer border-b-4 border-[#D4AF37] active:border-b-0">
                    สมัครสมาชิก
                </button>
            </form>
            
            <p class="mt-4 text-center text-xs font-bold text-gray-600">
                มีบัญชีอยู่แล้ว? <a href="./login.html" class="text-indigo-600 hover:underline">เข้าสู่ระบบที่นี่</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAGwlUc6aA18z0j5TWCQvHMuoPLXarvK-wvDGF2HkZT3yG-xERFH8WbzuKIEQxFNjAPQ/exec";

        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            const payload = {
                action: "register",
                username: username,
                email: email,
                password: password
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("ส่งข้อมูลสมัครสมาชิกสำเร็จ! ลองไปเช็คใน Google Sheets แผ่น 'users' ดูนะครับ (อย่าลืมใช้รหัสผ่านที่มีภาษาอังกฤษผสมเวลาล็อกอิน)");
                window.location.href = "login.html"; 
            })
            .catch(error => {
                console.error("Error:", error);
                alert("ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง");
            });
        });
    </script>
</body>
</html>
